        var storyData = [
            { lat: 41.0428465, lon: 29.0075283, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: red;">Chapter 01</h4>            <b>Location:</b> İstanbul: Beşiktaş: Beşiktaş Sarayı Önü<br><br>            <p style="font-size: 13px;"><b>Events:</b> The three men stand by the Bosphorus shore, watching Allied warships pass through. They meet an Anatolian soldier with a war medal. They hold hands and share a deep, silent connection of sacrifice, which makes Peyami feel like an outsider.</p>        </div>        ` },
{ lat: 41.0284233, lon: 28.9736808, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: red;">Chapter 01</h4>            <b>Location:</b> İstanbul: Beyoğlu: Tepebaşı<br><br>            <p style="font-size: 13px;"><b>Events:</b> They walk through the Tünel area feeling slightly triumphant and cheerful despite the tense atmosphere, noting the stares of the non-Muslim locals. | İhsan invites Peyami and Cemal to drink tea here after surviving the bombing. | The three men eat dinner in Beyoğlu, spend the night drinking at a bar in Tepebaşı, and get nearly drunk to cope with the tension of the day.</p>        </div>        ` },
{ lat: 39.9327342, lon: 32.8746726, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: red;">Chapter 01</h4>            <b>Location:</b> Ankara: Cebeci: Cebeci Hastanesi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami writes his memoirs while looking out the window at the red sky and yellow earth, reflecting on his lost legs and head wound, and discussing his condition with his doctor. | Salim carries the legless Peyami to a stretcher placed in the sunny stone corridor, where Peyami sleeps and reflects on his memories.</p>        </div>        ` },
{ lat: 41.006381, lon: 28.9758715, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: red;">Chapter 01</h4>            <b>Location:</b> İstanbul: Fatih: Darülfünun / Türk Ocağı<br><br>            <p style="font-size: 13px;"><b>Events:</b> Young women, teachers, and students gather here to carry out traditional nationalist propaganda, writing petitions and organizing.</p>        </div>        ` },
{ lat: 41.02972233810568, lon: 28.9744308, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: red;">Chapter 01</h4>            <b>Location:</b> İstanbul: Beyoğlu: Yabancı Sefaretler<br><br>            <p style="font-size: 13px;"><b>Events:</b> Nationalist women deliver political petitions to the embassies. İhsan accompanies the traditional women, while Cemal is spotted with the rival Şişli faction under Salime Hanım, prompting subtle exchanges between the two men.</p>        </div>        ` },
{ lat: 41.007680038105676, lon: 28.9766215, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: red;">Chapter 01</h4>            <b>Location:</b> İstanbul: Fatih: Galata Köprüsü<br><br>            <p style="font-size: 13px;"><b>Events:</b> The trio crosses the bridge together, talking and laughing after their drinking sessions.</p>        </div>        ` },
{ lat: 41.007680038105676, lon: 28.9751215, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: red;">Chapter 01</h4>            <b>Location:</b> İstanbul: Fatih: Beyazıt: Harbiye Nezareti<br><br>            <p style="font-size: 13px;"><b>Events:</b> Cemal and Peyami walk here and meet İhsan, a smart young officer from the Third Army. They stand and discuss the armistice before hearing the sound of approaching British planes.</p>        </div>        ` },
{ lat: 41.006381, lon: 28.9743715, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: red;">Chapter 01</h4>            <b>Location:</b> İstanbul: Fatih: Mercan<br><br>            <p style="font-size: 13px;"><b>Events:</b> Fleeing the British plane bombings, the crowd rushes down the slope. A massive bomb explosion occurs. Peyami leans frozen against a shop as casualties fall around him, while Cemal and İhsan bravely help a wounded hamal and a child.</p>        </div>        ` },
{ lat: 41.00508196189432, lon: 28.9751215, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: red;">Chapter 01</h4>            <b>Location:</b> İstanbul: Fatih: Sirkeci: Meserret Kıraathanesi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami and Cemal meet daily after 4 PM with military officers who debate the war, peace negotiations, Enver Pasha, and the Germans.</p>        </div>        ` },
{ lat: 41.0637891, lon: 28.9831642, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: red;">Chapter 01</h4>            <b>Location:</b> İstanbul: Şişli: Peyami's House<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami paces around restlessly after learning about the Bulgarian Armistice. Cemal arrives, kisses Peyami&#39;s mother&#39;s hand, and they discuss their family and İzmir. Later, this salon becomes a center for nationalist propaganda meetings, where Salime Hanım passionately debates.</p>        </div>        ` },
{ lat: 41.00508196189432, lon: 28.9766215, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: red;">Chapter 01</h4>            <b>Location:</b> İstanbul: Fatih: Sirkeci: Cemal's Favorite Salon<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami, Cemal, and İhsan gather at Cemal&#39;s favorite establishment in Sirkeci to drink rakı, talk, and socialize.</p>        </div>        ` },
{ lat: 41.0182861, lon: 28.9700158, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: blue;">Chapter 02</h4>            <b>Location:</b> İstanbul: Eminönü: Galata Köprüsü<br><br>            <p style="font-size: 13px;"><b>Events:</b> At the entrance of the bridge, İhsan secures a carriage for them. Cemal introduces İhsan to Ayşe, and İhsan respectfully bows and kisses Ayşe&#39;s hand.</p>        </div>        ` },
{ lat: 41.06508813810568, lon: 28.9839142, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: blue;">Chapter 02</h4>            <b>Location:</b> İstanbul: Şişli: Osmanbey Tramvay İstasyonu<br><br>            <p style="font-size: 13px;"><b>Events:</b> The group boards a tram in front of Osmanbey, navigating through a tense, observant crowd of Muslims and Christians on their way to the rally.</p>        </div>        ` },
{ lat: 41.06508813810568, lon: 28.9824142, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: blue;">Chapter 02</h4>            <b>Location:</b> İstanbul: Şişli: Peyami'nin Evi<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan enters Peyami&#39;s bedroom early in the morning to break the tragic news of the massacre in Izmir, including the deaths of Mukbil Bey and Hasan, and Ayşe&#39;s injury. Later, Cemal&#39;s bed is moved here, where Peyami watches over him in his silent grief. | Peyami rushes downstairs after hearing the tragic news to avoid Cemal. Later, he goes downstairs repeatedly to find his mother crying and İhsan waiting silently like they are at a wake. | A gathering takes place where Salime Hanım, Mister Cook (an arrogant British journalist), Miralay Haşmet Bey, and other officers discuss the political climate. Ayşe passionately defends the Turkish nation, detailing the atrocities in Izmir and rejecting British patronization. Following her speech, the moved Turkish officers pledge their swords and lives to her cause.</p>        </div>        ` },
{ lat: 41.006381, lon: 28.9788715, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: blue;">Chapter 02</h4>            <b>Location:</b> İstanbul: Fatih: Sultanahmet: German Fountain<br><br>            <p style="font-size: 13px;"><b>Events:</b> The group gets off the tram at Ayasofya and struggles to push through the immense, emotional crowd moving towards Sultanahmet. | The historical Sultanahmet Mitingi (Rally) takes place. Standing on the steps of the German Fountain, Peyami, Cemal, and Ayşe witness the sea of crying citizens, black flags, wounded veterans, and speeches protesting the occupation. Aircraft fly overhead, and Ayşe weeps bitterly.</p>        </div>        ` },
{ lat: 41.0228645, lon: 28.9740393, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: blue;">Chapter 02</h4>            <b>Location:</b> İstanbul: Karaköy: Rıhtım<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami and Cemal go to the crowded harbor to meet Ayşe as she arrives by ferry from Izmir. Peyami observes the Greek soldiers and officers on the docks while waiting.</p>        </div>        ` },
{ lat: 39.9207759, lon: 32.8540497, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: green;">Chapter 03</h4>            <b>Location:</b> Ankara<br><br>            <p style="font-size: 13px;"><b>Events:</b> The narrator Peyami, sitting in the cold environment of Ankara, reflects on his past days in Istanbul and his regular visits to Ayşe&#39;s house.</p>        </div>        ` },
{ lat: 41.0067552, lon: 28.9656936, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: green;">Chapter 03</h4>            <b>Location:</b> İstanbul: Gedikpaşa: Ayşe'nin Evi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ayşe moves to a modest two-room house in Gedikpaşa, living a simple and hardworking life knitting and teaching. Peyami visits her here every evening, and İhsan frequently joins them, harborning a quiet, intense love for Ayşe. | Peyami finds İhsan and the formidable Haşmet Bey at Ayşe&#39;s house. They discuss the imminent threat of British occupation in Istanbul and map out plans for İhsan to escape by land to Adapazarı to join the nationalist resistance. | Peyami and İhsan return to Ayşe&#39;s house late at night for a heavy, solemn farewell. Ayşe expresses deep sadness over İhsan&#39;s departure for the front lines, leaving everyone feeling anxious and melancholic.</p>        </div>        ` },
{ lat: 41.02972233810568, lon: 28.9729308, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: green;">Chapter 03</h4>            <b>Location:</b> İstanbul: Beyoğlu: Tepebaşı Bahçesi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami points out a garden overflowing with music and life to İhsan, suggesting they distract themselves instead of returning home directly.</p>        </div>        ` },
{ lat: 41.008979076211354, lon: 28.9773715, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: green;">Chapter 03</h4>            <b>Location:</b> İstanbul: Fatih: Galata Köprüsü<br><br>            <p style="font-size: 13px;"><b>Events:</b> As they cross the Galata Bridge on the tram, İhsan stares out at the dark waters of Haliç and the bare, mast-like silhouettes of sailing boats.</p>        </div>        ` },
{ lat: 41.008979076211354, lon: 28.9743715, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: green;">Chapter 03</h4>            <b>Location:</b> İstanbul: Fatih: Beyazıt: Harbiye Nezareti<br><br>            <p style="font-size: 13px;"><b>Events:</b> Haşmet Bey, İhsan, and Peyami walk toward Beyazıd. Haşmet Bey gazes with deep concern at the Ministry of War, commenting on the nation&#39;s destiny before parting ways with them.</p>        </div>        ` },
{ lat: 41.0150174, lon: 28.977962, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: green;">Chapter 03</h4>            <b>Location:</b> İstanbul: Sirkeci: İstanbul Lokantası<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami and İhsan eat dinner and drink wine while looking out at Sirkeci. They observe French Senegalese soldiers mocking locals outside, prompting İhsan to make a bitter remark about foreign civilization.</p>        </div>        ` },
{ lat: 40.9912955, lon: 29.0245631, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: green;">Chapter 03</h4>            <b>Location:</b> İstanbul: Kadıköy: Moda'da Bir Tüccarın Evi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ayşe recounts an incident during a Turkish lesson she was giving here. Salime Hanım arrived on an English tugboat, completely ignoring Ayşe and snobbishly suggesting the family hire an English governess instead.</p>        </div>        ` },
{ lat: 41.0637891, lon: 28.9816642, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: green;">Chapter 03</h4>            <b>Location:</b> İstanbul: Şişli: Pangaltı<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan gets off the tram, declaring he cannot bear the sight of foreign military uniforms any longer and intends to bid farewell to other female acquaintances.</p>        </div>        ` },
{ lat: 41.06249006189432, lon: 28.9824142, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: green;">Chapter 03</h4>            <b>Location:</b> İstanbul: Şişli: Peyami'nin Evi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami&#39;s mother discusses her fears and complains about Ayşe&#39;s presence bringing British surveillance. When Ayşe enters the room, she and İhsan share a profound and silent emotional connection upon seeing each other again.</p>        </div>        ` },
{ lat: 41.006381, lon: 28.9728715, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: green;">Chapter 03</h4>            <b>Location:</b> İstanbul: Fatih: Sirkeci: İstanbul Lokantası<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami and İhsan board a tram together as night falls, navigating through the streets of Istanbul and deciding to have dinner together.</p>        </div>        ` },
{ lat: 41.0703914, lon: 30.1523298, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: purple;">Chapter 04</h4>            <b>Location:</b> Kocaeli: Kandıra: Adapazarı Road<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ayşe, Peyami, and Seyfi travel disguised as peasants with an oxcart under the stars, sleeping in the open fields.</p>        </div>        ` },
{ lat: 41.00378292378864, lon: 28.9743715, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: purple;">Chapter 04</h4>            <b>Location:</b> İstanbul: Fatih: Gedikpaşa: Ayşe'nin Evi<br><br>            <p style="font-size: 13px;"><b>Events:</b> British soldiers and an Armenian translator search the house, ordering Ayşe to leave, prompting her to pack and depart.</p>        </div>        ` },
{ lat: 41.00378292378864, lon: 28.9773715, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: purple;">Chapter 04</h4>            <b>Location:</b> İstanbul: Fatih: Direklerarası<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ayşe witnesses the bloody aftermath of the British soldiers bayoneting the sleeping Turkish guards.</p>        </div>        ` },
{ lat: 41.00805423810568, lon: 28.9664436, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: purple;">Chapter 04</h4>            <b>Location:</b> İstanbul: Gedikpaşa: Gedikpaşa Tramvay Caddesi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ayşe helps a weeping young mother whose husband joined the national resistance to find a carriage.</p>        </div>        ` },
{ lat: 41.006381, lon: 28.9803715, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: purple;">Chapter 04</h4>            <b>Location:</b> İstanbul: Fatih: Harbiye Nezareti<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ayşe observes Turkish military officers standing silently as the British army takes control of the War Ministry.</p>        </div>        ` },
{ lat: 41.0265498, lon: 29.0151321, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: purple;">Chapter 04</h4>            <b>Location:</b> İstanbul: Üsküdar: İhsaniye Ferry<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ayşe rides the ferry to Üsküdar with the young mother, watching British guns aimed at the city.</p>        </div>        ` },
{ lat: 41.010278114317025, lon: 28.9781215, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: purple;">Chapter 04</h4>            <b>Location:</b> İstanbul: Fatih: İstanbul Semaları<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami hallucinates flying in a plane with a bed while being hunted by British planes.</p>        </div>        ` },
{ lat: 41.071690438105676, lon: 30.1530798, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: purple;">Chapter 04</h4>            <b>Location:</b> Kocaeli: Kandıra: Coastline<br><br>            <p style="font-size: 13px;"><b>Events:</b> The group stops by the sea to take a final look at the Gulf of Izmit and say a tearful goodbye to Istanbul.</p>        </div>        ` },
{ lat: 41.06249006189432, lon: 28.9839142, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: purple;">Chapter 04</h4>            <b>Location:</b> İstanbul: Şişli: Peyami's House<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami suffers from typhus, hallucinates, and recovers. He sends Ahmed Ağa to find Ayşe, receives her letters, and writes a desperate reply.</p>        </div>        ` },
{ lat: 41.027848838105676, lon: 29.0158821, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: purple;">Chapter 04</h4>            <b>Location:</b> İstanbul: Üsküdar: Seyfi's House<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ayşe meets Mülâzım Seyfi, who helps her carry her bundle and guides her to safety. | A yellow wooden house near a cemetery where Ayşe hides, hosts nationalist conspirators, and is eventually reunited with Peyami to plan their escape. | Peyami wanders searchingly through shady alleys and neighborhoods, looking under the veils of women to find Ayşe. | Peyami spots Seyfi in a kalpak and intercepts him to find out where Ayşe is hidden.</p>        </div>        ` },
{ lat: 41.010074, lon: 28.947984, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: purple;">Chapter 04</h4>            <b>Location:</b> İstanbul: Yusufpaşa: House of the Assaulted Girls<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ayşe passes a ransacked house where local girls were assaulted by invading forces.</p>        </div>        ` },
{ lat: 40.7726291, lon: 30.4038575, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: orange;">Chapter 05</h4>            <b>Location:</b> Sakarya: Adapazarı: Adapazarı Yolu<br><br>            <p style="font-size: 13px;"><b>Events:</b> Kafilenin geçişi sırasında pusu kurulur ve ateş açılır. Ahmed Rıfkı ve çetesi kayaların arkasına sığınarak çatışmaya girer. Çatışma sonrası düşman kaçar, bacağından vurulan bir müfreze üyesinin yarasını Ayşe pansuman eder.</p>        </div>        ` },
{ lat: 40.77392813810568, lon: 30.4046075, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: orange;">Chapter 05</h4>            <b>Location:</b> Sakarya: Adapazarı: Adapazarı Yolu Üzerindeki Kahvehane<br><br>            <p style="font-size: 13px;"><b>Events:</b> Karanlık ve küf kokulu bu yerde mola verilir. Seyfi ve çavuş milis güçlerinin yetersizliğini tartışırken gerginlik yaşanır. Ardından İhsan atlılarıyla gelir, Ayşe&#39;nin ellerini öper ve onun güvenliği için Adapazarı yerine Doğançay&#39;a gitmeye karar verirler.</p>        </div>        ` },
{ lat: 41.071690438105676, lon: 30.1515798, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: orange;">Chapter 05</h4>            <b>Location:</b> Kocaeli: Kandıra: Kandıra Köyleri<br><br>            <p style="font-size: 13px;"><b>Events:</b> İstanbul mültecilerinin ve askerlerin geçip gittiği, yerel halkın ürkekçe tarlalarında çalıştığı ve savaş haberlerinin ulaştığı geçiş güzergâhı köyler.</p>        </div>        ` },
{ lat: 40.5090547, lon: 30.2902514, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: orange;">Chapter 05</h4>            <b>Location:</b> Sakarya: Geyve: İhsan's House<br><br>            <p style="font-size: 13px;"><b>Events:</b> Geyve&#39;de İhsan&#39;ın evinde misafir olurlar. İhsan odasını Ayşe&#39;ye verir. Peyami ve İhsan karşı odada konuşur, ardından Peyami Ayşe&#39;nin odasına geçer. Ayşe, İhsan&#39;ın kendisini uzaklaştırmak istemesine öfkelenir ve Eskişehir&#39;e gitmeyi kabul eder. Üçü birlikte gergin bir akşam yemeği yerler.</p>        </div>        ` },
{ lat: 41.0703914, lon: 30.1508298, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: orange;">Chapter 05</h4>            <b>Location:</b> Kocaeli: Kandıra: A Village in Kandıra<br><br>            <p style="font-size: 13px;"><b>Events:</b> Sabah horozlar öterken yola çıkan kafile, Geyve&#39;de çarpışan İhsan&#39;ın maiyetinden Ahmed Rıfkı ve sekiz atlısıyla karşılaşır. Ayşe&#39;nin kimliği açıklanınca çeteler dindar bir huşuyla elini öper; at temin edilerek seyahat tarzı değiştirilir.</p>        </div>        ` },
{ lat: 40.51035373810568, lon: 30.2910014, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: orange;">Chapter 05</h4>            <b>Location:</b> Sakarya: Geyve: Doğançay: Sarılar Village<br><br>            <p style="font-size: 13px;"><b>Events:</b> Kafilenin gelişi köyde büyük bir paniğe yol açar, ancak gelenlerin İhsan&#39;ın kuvvetleri olduğu anlaşılınca halk rahatlar. İhsan&#39;a aşık olan köylü kızı Kezban ile Ayşe burada tanışır. | Ayşe burada hastabakıcılık yapar. Ahmed Rıfkı her akşamüstü onu ziyarete gelir; Kezban ise ağaçların arkasından İhsan&#39;ı bekler. İhsan, Ayşe&#39;yi güvenliği için Eskişehir&#39;e göndermeye karar verdiğini burada açıklar. | İhsan, Peyami ve Ayşe, vurulan Ahmed Rıfkı&#39;nın yanına koşarlar. Onu kalbinden vurulmuş, cansız bir şekilde bulurlar. Söğüt dallarından sedye yapıp köye taşırlar. | İmam ve küçük bir cemaat eşliğinde Ahmed Rıfkı toprağa verilir. Ayşe mezarlıkta söğütlerin altında hıçkırarak ağlar.</p>        </div>        ` },
{ lat: 40.51035373810568, lon: 30.2895014, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: orange;">Chapter 05</h4>            <b>Location:</b> Sakarya: Geyve: Doğançay: Sarılar Köyü<br><br>            <p style="font-size: 13px;"><b>Events:</b> Köyden ayrılan kafilenin arkasından koşan Kezban, kendisini de götürmeleri için ağlayarak yalvarır. Ayşe&#39;nin teselli çabasını öfkeyle reddeder. İhsan&#39;ın sert emri üzerine çaresizce köye geri döner.</p>        </div>        ` },
{ lat: 41.06909236189432, lon: 30.1515798, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkred;">Chapter 06</h4>            <b>Location:</b> Kocaeli: Kandıra: İkizce (Çerkes Köyü)<br><br>            <p style="font-size: 13px;"><b>Events:</b> They are hosted by Mürsel Ağa and his two sons. Peyami sees a military photo of one of the sons from Istanbul, and Mehmet Çavuş speaks passionately about the Sultan and the revolution. | One of Mürsel Ağa&#39;s sons stops Peyami and Mehmet Çavuş to warn them about a local Circassian village and advises them that Saffet Bey is hiding in Kaymaz. | Peyami rides through a picturesque village with terrace houses, seeing a girl on a green balcony and a man on the red dirt road, reflecting on brotherhood and the national struggle. | Suspecting they are being pursued, Peyami and Mehmet Çavuş dismount and hide behind a mound, leading to a tense standoff where they finally encounter Yüzbaşı Saffet Bey and his men.</p>        </div>        ` },
{ lat: 40.5090547, lon: 30.2887514, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkred;">Chapter 06</h4>            <b>Location:</b> Sakarya: Geyve<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami reflects on his new sense of freedom after Ayşe&#39;s departure and resolves to prove his bravery here, training under Ihsan and Mehmet Çavuş. | They make a grueling six-day return journey, walking alongside the squeaking oxcarts, hiding the ammunition boxes during the day, and traveling only at night.</p>        </div>        ` },
{ lat: 40.50775566189432, lon: 30.2895014, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkred;">Chapter 06</h4>            <b>Location:</b> Sakarya: Geyve: İhsan'ın Karargâhı<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ihsan summons Peyami and Mehmet Çavuş in the morning to hand them a mission to retrieve buried ammunition near Kandıra with the help of Yüzbaşı Saffet.</p>        </div>        ` },
{ lat: 41.06909236189432, lon: 30.1530798, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkred;">Chapter 06</h4>            <b>Location:</b> Kocaeli: Kandıra: İkizce<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami and Mehmet Çavuş struggle through dense, thorny bushes at night as the moonlight fades. | They look down from the ridge and observe a massive fire burning near a white stream in the dark plain. | They enter a clean house belonging to a Circassian host. Peyami meets Saffet Bey under the light, admires his refined yet dangerous character, and they finalize plans to transport the thirty carts of hidden ammunition.</p>        </div>        ` },
{ lat: 41.0703914, lon: 30.1553298, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkred;">Chapter 06</h4>            <b>Location:</b> Kocaeli: Kandıra: Flatland<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami and Mehmet Çavuş ride their small local horses through a hot, dusty, and dry flatland flanked by mountains.</p>        </div>        ` },
{ lat: 41.072989476211355, lon: 30.1538298, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkred;">Chapter 06</h4>            <b>Location:</b> Kocaeli: Kandıra: İkizce: Cami Meydanı<br><br>            <p style="font-size: 13px;"><b>Events:</b> They quickly ride past the village mosque as they hear doors beginning to open in the dark.</p>        </div>        ` },
{ lat: 40.50775566189432, lon: 30.2910014, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkred;">Chapter 06</h4>            <b>Location:</b> Sakarya: Geyve: Headquarters<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ihsan visits Peyami in his room at night to check on his health and cover him up, showing a softer, protective side.</p>        </div>        ` },
{ lat: 40.5090547, lon: 30.2932514, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkred;">Chapter 06</h4>            <b>Location:</b> Sakarya: Geyve: Sakarya Nehri<br><br>            <p style="font-size: 13px;"><b>Events:</b> They cross the Sakarya River, hiding Mehmet Çavuş under the hay in a refugee&#39;s cart to pass unnoticed.</p>        </div>        ` },
{ lat: 40.511652776211356, lon: 30.2917514, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkred;">Chapter 06</h4>            <b>Location:</b> Sakarya: Geyve: Sarılar Köyü<br><br>            <p style="font-size: 13px;"><b>Events:</b> Mehmet Çavuş points out the willow-covered village of Sarılar, prompting a discussion about Ahmed Rıfkı and Ihsan&#39;s strict military leadership.</p>        </div>        ` },
{ lat: 40.511652776211356, lon: 30.2887514, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkred;">Chapter 06</h4>            <b>Location:</b> Sakarya: Geyve: Talimgâh<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ihsan subjects Peyami to harsh, grueling equestrian and combat drills, testing his physical limits.</p>        </div>        ` },
{ lat: 40.5090547, lon: 30.2872514, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkred;">Chapter 06</h4>            <b>Location:</b> Sakarya: Geyve: Sarılar: Boş Ağıl<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami and Mehmet Çavuş camp out for the night by a fire, and Mehmet Çavuş recounts a dramatic story of smuggling weapons out of occupied Istanbul.</p>        </div>        ` },
{ lat: 40.506456623788644, lon: 30.2887514, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: lightred;">Chapter 07</h4>            <b>Location:</b> Sakarya: Geyve: Doğançay Karargâhı<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami&#39;nin karargâhı bulduğu, askerlerin toplandığı ve ertesi gün Mehmet Çavuş liderliğindeki kağnıların ulaştığı yer.</p>        </div>        ` },
{ lat: 40.506456623788644, lon: 30.2917514, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: lightred;">Chapter 07</h4>            <b>Location:</b> Sakarya: Geyve: Doğançay: Karargâh Dışındaki Ağaçlık<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami&#39;nin Kezban&#39;ı karargâh dışına çıkardığı, para vermeye çalıştığı esnada Mehmet Çavuş&#39;un ateş açıp Peyami&#39;yi kolundan yaraladığı ve Kezban&#39;ı kaçırdığı yer.</p>        </div>        ` },
{ lat: 40.5090547, lon: 30.2947514, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: lightred;">Chapter 07</h4>            <b>Location:</b> Sakarya: Geyve: Doğançay: İhsan'ın Çadırı ve Karargâhı<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami ve Mehmet Çavuş&#39;un İhsan&#39;a rapor verdiği, İhsan&#39;ın kararlar aldığı ve geceleyin Kezban&#39;ın gizlice girerek ağladığı çadır. | Peyami&#39;nin gece uyuyamadığı, yan çadırdaki sesleri dinlediği ve ertesi gece Kezban&#39;ın gizlice gelerek ona dertlerini anlattığı yer. | Peyami&#39;nin gece çadırından çıkıp çakmak çaktığı ve Mehmet Çavuş&#39;u elinde tüfekle İhsan&#39;ın çadırını dinlerken bulup konuştuğu yer.</p>        </div>        ` },
{ lat: 40.51295181431703, lon: 30.2925014, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: lightred;">Chapter 07</h4>            <b>Location:</b> Sakarya: Geyve: Sarılar Köyü: Ayşe'nin Hastahanesi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami&#39;nin uzaktan dalarak baktığı ve Ayşe&#39;yi beyaz gömleğiyle hayal ettiği yer.</p>        </div>        ` },
{ lat: 37.9440334, lon: 32.5054789, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: lightred;">Chapter 07</h4>            <b>Location:</b> Konya: Sarılar Köyü<br><br>            <p style="font-size: 13px;"><b>Events:</b> Mehmet Çavuş ve Peyami ceb-hâneyi buraya yığmaya karar verirler. | Peyami at üstünde ilerlerken Ayşe&#39;nin hastanesini görür ve söğüt ağacına yaslanmış olan Kezban ile karşılaşarak onunla konuşur.</p>        </div>        ` },
{ lat: 37.872734, lon: 32.4924376, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkblue;">Chapter 08</h4>            <b>Location:</b> Konya: Unnamed Subdistrict: İhsan's Tent<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan recovers from his wounds in his tent while Muhsin Bey and a sentry recount how a disguised Circassian boy (Kezban) ran for six hours to warn them of the trap.</p>        </div>        ` },
{ lat: 37.87403303810568, lon: 32.4931876, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkblue;">Chapter 08</h4>            <b>Location:</b> Konya: İhsan'ın Çadırı<br><br>            <p style="font-size: 13px;"><b>Events:</b> A feverish Peyami rests in bed. İhsan enters after returning from his three-day retributive campaign, reveals he has hanged Mehmet Çavuş, and begs Peyami to swear an oath never to tell Ayşe about these events.</p>        </div>        ` },
{ lat: 37.87403303810568, lon: 32.491687600000006, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkblue;">Chapter 08</h4>            <b>Location:</b> Konya: Bilinmeyen Nahiye Merkezine Yakın Ova<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan, Peyami, and five horsemen ride towards a village in the plain after being invited under false pretenses of peace by a local delegation.</p>        </div>        ` },
{ lat: 37.94533243810568, lon: 32.506228899999996, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkblue;">Chapter 08</h4>            <b>Location:</b> Konya: Sarılar: Irmak Kenarı<br><br>            <p style="font-size: 13px;"><b>Events:</b> The riverbank where soldiers search for the mysterious boy, finding only a discarded Circassian coat and boots.</p>        </div>        ` },
{ lat: 37.94533243810568, lon: 32.5047289, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkblue;">Chapter 08</h4>            <b>Location:</b> Konya: Sarılar: Harap Değirmen Binası<br><br>            <p style="font-size: 13px;"><b>Events:</b> A group of hostile villagers rushes out of this ruined mill to attack the horsemen from behind.</p>        </div>        ` },
{ lat: 37.872734, lon: 32.4909376, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkblue;">Chapter 08</h4>            <b>Location:</b> Konya: Unnamed Sub-district: Nahiye Hükümet Konağı ve Hapishane<br><br>            <p style="font-size: 13px;"><b>Events:</b> In the dirty courtyard and prison cells, İhsan is held in heavy chains behind iron bars. Mehmet Çavuş attempts to incite the local crowd to break in and murder İhsan before a rescue group arrives.</p>        </div>        ` },
{ lat: 37.87143496189432, lon: 32.491687600000006, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkblue;">Chapter 08</h4>            <b>Location:</b> Konya: Unidentified Subdistrict: Köyün Önündeki Yeşil Meydan<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan leaps over a deep ditch onto the green field, where he and his horsemen are immediately ambushed and surrounded by a hostile crowd.</p>        </div>        ` },
{ lat: 39.9362064, lon: 32.8426798, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkgreen;">Chapter 09</h4>            <b>Location:</b> Ankara: Ulus: Müdâfaa-i Milliyye Dairesi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami works at his desk, going from room to room, feeling isolated from his friends and the real action at the front.</p>        </div>        ` },
{ lat: 39.93403323810568, lon: 32.87542259999999, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkgreen;">Chapter 09</h4>            <b>Location:</b> Ankara: Cebeci: Cebeci Hastanesi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami is visited by his doctor, reflects on his upcoming surgery, and looks through his diary notes before embarking on the last part of his story.</p>        </div>        ` },
{ lat: 39.7765193, lon: 30.5288805, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkgreen;">Chapter 09</h4>            <b>Location:</b> Eskişehir: Merkez: Eskişehir Hastanesi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami meets Ayşe, who is wearing a white apron and black headscarf. They talk about his wound, İhsan, and Cemal. | Ayşe works tirelessly in the surgical hospital. She watches the brave soldiers, cares for the wounded like Hüseyin Çavuş, and witnesses their silent strength. | Ayşe feeds the wounded soldiers on her knees. She records a wounded Sivaslı soldier&#39;s address in her notebook, spreading comfort among the men. | During the chaotic evacuation, Ayşe assists the doctor with horrific amputations, holds dying soldiers, and pretends to understand the final silent words of a dying officer. | A feverish, delirious soldier from Ankara escapes his ward, screaming to be taken back to Ankara, before being restrained by medics. | An exhausted Ayşe collapses in tears against a wall. Haşmet Bey finds her, restores her hope, and promises to take her to the active combat front in Polatlı.</p>        </div>        ` },
{ lat: 39.777818338105675, lon: 30.5296305, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkgreen;">Chapter 09</h4>            <b>Location:</b> Eskişehir: Merkez: Eskişehir İstasyonu<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami gets off the train with a bandaged arm, thinking about how Ayşe will react to his wound. | Ayşe describes the crowded station where wounded soldiers arrive on stretchers, and they are served tea at the teahouse while clutching their bread rations.</p>        </div>        ` },
{ lat: 39.777818338105675, lon: 30.5281305, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkgreen;">Chapter 09</h4>            <b>Location:</b> Eskişehir: Merkez: Eskişehir'de Bir Cadde<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami tries to cross the street amidst passing soldiers, feeling a childish excitement as drums and zurnas play.</p>        </div>        ` },
{ lat: 41.9785763, lon: 33.7599031, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkgreen;">Chapter 09</h4>            <b>Location:</b> Kastamonu: İnebolu: İnebolu Sahili<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami travels to İnebolu for military intelligence work, feeling detached from the beautiful landscapes because his heart is with his friends.</p>        </div>        ` },
{ lat: 39.7743941, lon: 30.519116, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkgreen;">Chapter 09</h4>            <b>Location:</b> Eskişehir: Madam Tadia'nın Oteli<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami, Cemal, and Ayşe have dinner together. Cemal speaks about the betrayal of his friends and his escape from Greek custody. Haşmet Bey joins them later, sharing coffee and pastries. | Ayşe lies sick with malaria during the Kütahya War, having vivid hallucinations of hospital work. She wakes up to an airstrike and flees with Madam Tadia.</p>        </div>        ` },
{ lat: 39.7765193, lon: 30.5273805, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkgreen;">Chapter 09</h4>            <b>Location:</b> Eskişehir: Merkez: Hastaneye Giden Yol<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami, Cemal, and Haşmet Bey walk Ayşe back to the hospital late at night.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1417303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkgreen;">Chapter 09</h4>            <b>Location:</b> Ankara: Polatlı: Tren Kompartımanı<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ayşe travels through the night in an open train car with wounded soldiers, conversing softly with them as they head towards Polatlı.</p>        </div>        ` },
{ lat: 39.93750543810568, lon: 32.843429799999996, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Ulus: Müdafaa-i Milliye Dairesi<br><br>            <p style="font-size: 13px;"><b>Events:</b> The narrator works among papers, yearning for the front, and is suddenly called by his chief to be dispatched as a Greek translator and photographer.</p>        </div>        ` },
{ lat: 39.93750543810568, lon: 32.8419298, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Altındağ: Ankara İstasyonu<br><br>            <p style="font-size: 13px;"><b>Events:</b> The narrator departs by train at nine in the evening toward the battlefront.</p>        </div>        ` },
{ lat: 39.58696903810568, lon: 32.142480299999995, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Polatlı: Şube Binası<br><br>            <p style="font-size: 13px;"><b>Events:</b> The wooden building where the narrator works daily on Greek newspapers and drafts daily orders.</p>        </div>        ` },
{ lat: 39.58696903810568, lon: 32.1409803, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Polatlı: Şoförler Çadırı<br><br>            <p style="font-size: 13px;"><b>Events:</b> A neighboring tent where drivers read romantic novels, sing, and joke to maintain high spirits during the battle.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1402303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Polatlı: Gökçepınar Mezarlığı<br><br>            <p style="font-size: 13px;"><b>Events:</b> The narrator recalls dreaming of walking through this cemetery and remembers Haşmet Bey offering to bury his amputated legs there.</p>        </div>        ` },
{ lat: 39.58437096189432, lon: 32.1409803, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Polatlı: Alagöz (Karargâh Köyü)<br><br>            <p style="font-size: 13px;"><b>Events:</b> A small five-to-six house village serving as the Garp Cephesi headquarters where the narrator works and experiences the tense atmosphere of the Sakarya Campaign.</p>        </div>        ` },
{ lat: 39.58437096189432, lon: 32.142480299999995, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Polatlı: Alagöz Karargâhı: İhsan'ın Çadırı<br><br>            <p style="font-size: 13px;"><b>Events:</b> The small tent shared by the narrator and Zihni Efendi where they sleep, hear incoming reports, and later joyously pack up on September 9th.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1447303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Polatlı: Son İstasyon<br><br>            <p style="font-size: 13px;"><b>Events:</b> The train arrives before dawn; troops silently unload animals and ammunition, and an attack battalion commander barks marching orders.</p>        </div>        ` },
{ lat: 39.58826807621136, lon: 32.1432303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Polatlı: Değirmen Harkı<br><br>            <p style="font-size: 13px;"><b>Events:</b> The travelers cross a frothing, white mill stream with their startled animals.</p>        </div>        ` },
{ lat: 39.58826807621136, lon: 32.1402303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Polatlı: Seyyar Hastane<br><br>            <p style="font-size: 13px;"><b>Events:</b> The travelers pass a dark, dome-like mobile hospital, and the narrator realizes with sorrow how far it is from Ayşe.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1387303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Polatlı: Karşıki Yamaç<br><br>            <p style="font-size: 13px;"><b>Events:</b> An opposite hill slope where the narrator watches the military band play, observing İsmet Paşa and the Commander-in-Chief discussing the front.</p>        </div>        ` },
{ lat: 39.583071923788644, lon: 32.1402303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Polatlı: Alagöz: Başkumandanlık Binası<br><br>            <p style="font-size: 13px;"><b>Events:</b> A simple, two-story village house with a balcony where the Commander-in-Chief works through the night under glowing lights.</p>        </div>        ` },
{ lat: 39.583071923788644, lon: 32.1432303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: cadetblue;">Chapter 10</h4>            <b>Location:</b> Ankara: Polatlı: Tren Kompartımanı<br><br>            <p style="font-size: 13px;"><b>Events:</b> The narrator travels with a reserve officer and three regular officers on a train carrying ammunition. | The train cars serving as the second headquarters where the narrator and Zihni Efendi share a dormitory and discuss the narrator&#39;s request to transfer to the front line.</p>        </div>        ` },
{ lat: 39.9362064, lon: 32.8411798, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Altındağ: Ankara İstasyonu<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan&#39;s cousin&#39;s family sends him off; his cousin&#39;s daughter Sabiha cries and kisses him goodbye, hinting at a potential match that İhsan reluctantly accepts.</p>        </div>        ` },
{ lat: 40.0582241, lon: 32.0057462, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Dikmen: Cousin's House<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan spends his recovery leave here, walking in the fields with his cousin&#39;s daughters, feeling temporarily happy and free of his feverish obsession.</p>        </div>        ` },
{ lat: 39.77522026189432, lon: 30.5281305, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Eskişehir: Merkez: Eskişehir Hastanesi<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan remembers waking up on the operating table to find Ayşe placing a cold cloth on his forehead and nursing him with tender care.</p>        </div>        ` },
{ lat: 39.77522026189432, lon: 30.5296305, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Eskişehir: Merkez: Eskişehir İstasyonu<br><br>            <p style="font-size: 13px;"><b>Events:</b> The next morning, Ayşe shakes İhsan&#39;s hand in public and departs, leaving him alone in his compartment.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1462303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Polatlı: Gökçepınar<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan travels to Gökçepınar and visits Haşmet Bey&#39;s headquarters under the guise of military business. He finds Haşmet Bey, Cemal, and Ayşe sitting together by a large fireplace, where he experiences intense jealousy seeing Ayşe&#39;s proximity to Haşmet Bey.</p>        </div>        ` },
{ lat: 39.4341352, lon: 32.4987922, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Haymana: Haymana Camii<br><br>            <p style="font-size: 13px;"><b>Events:</b> Amid heavy rain, mud, and falling shells, İhsan searches for wounded comrades from his corps. | Serving as a crowded casualty clearing station, İhsan discovers Ayşe tirelessly treating horrific wounds. He feels a sense of spiritual reverence and devotion watching her selflessness.</p>        </div>        ` },
{ lat: 39.58956711431703, lon: 32.143980299999996, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Polatlı: Alagöz (Tatar Köyü): İhsan'ın Odası<br><br>            <p style="font-size: 13px;"><b>Events:</b> Cemal visits İhsan during fierce fighting, congratulates him on his rumored engagement with Sabiha, and unwittingly reveals that Ayşe heard about it, explaining her coldness on the train. Cemal also mentions Ayşe&#39;s care of Haşmet Bey. | Three days after Haymana, the chief doctor of the mobile hospital visits İhsan. İhsan angrily demands that Ayşe be ordered to return from Haşmet Bey&#39;s combat division to the mobile hospital.</p>        </div>        ` },
{ lat: 39.77569313810568, lon: 30.519866, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Eskişehir: Merkez: Madam Tadia'nın Oteli<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan remembers being cared for by Ayşe in this hotel room. He details their intimate conversations, his violent confession of love where he tore his own bandages, and her promise to marry him once they enter Izmir.</p>        </div>        ` },
{ lat: 39.58956711431703, lon: 32.1394803, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Polatlı: Mallı Station<br><br>            <p style="font-size: 13px;"><b>Events:</b> The train stops; a shivering İhsan sends a soldier to confirm Ayşe&#39;s presence, then rushes to her compartment.</p>        </div>        ` },
{ lat: 39.9042599, lon: 30.0372781, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Bilecik: Bozüyük: Metris Tepe<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan recounts being shot in the chest at Metris Tepe during the Second Battle of İnönü, losing consciousness and believing he was dying.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1372303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Polatlı: Seyyar Hastane (Ayşe'nin Çadırı)<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan rides to the mobile hospital at 1 AM to check if Ayşe has returned, finding her working on dressings, which relieves his anxiety. | İhsan visits Ayşe in her tent at night, demanding she confirm her feelings. She states that they have both changed and that the time for such talk has passed.</p>        </div>        ` },
{ lat: 39.58177288568297, lon: 32.1394803, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Polatlı: Dağ Yolu<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan and Peyami walk up the mountain before dinner. İhsan begins his deep confession about his absolute, feverish obsession with Ayşe since his Istanbul days.</p>        </div>        ` },
{ lat: 39.58177288568297, lon: 32.143980299999996, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Polatlı: Tepe Üstündeki Gözetleme Siperi<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan and Peyami reach the observation trench where lookouts stand. İhsan monitors enemy movements, makes phone calls, and continues recounting his painful love for Ayşe.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1477303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Polatlı: Train Compartment<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan is forced to leave Ayşe&#39;s compartment as the train proceeds.</p>        </div>        ` },
{ lat: 39.590866152422706, lon: 32.1447303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Polatlı: Tatar Köyü<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami enters a village square, notices a Tatar woman coming out of a barn, and asks a sentry where the Chief of Staff is.</p>        </div>        ` },
{ lat: 39.9645375, lon: 32.5839944, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Sincan: Tren Kompartımanı<br><br>            <p style="font-size: 13px;"><b>Events:</b> Leaving Ankara, İhsan and his fellow officers talk in their cold compartment, and he learns that an Izmirite nurse (Ayşe) is traveling in the adjacent compartment. | İhsan enters Ayşe&#39;s dimly lit compartment. She keeps her distance and cries silently. They talk about Ankara, and she refuses to visit him due to rumors of his engagement to Sabiha.</p>        </div>        ` },
{ lat: 39.590866152422706, lon: 32.1387303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Polatlı: Tatar Köyü<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami asks a guard at the village entrance for directions to the Chief of Staff&#39;s location. | Standing by a dying fire as the evening adhan echoes, Ayşe and İhsan weep together in mutual sorrow before she departs for Haşmet Bey&#39;s headquarters.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1357303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Polatlı: Köy Evindeki Küçük Oda<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami finds İhsan working at a wooden table in his coat. They discuss İhsan&#39;s transfer to command the regiment and their mutual desire to face danger.</p>        </div>        ` },
{ lat: 39.580473847577295, lon: 32.1387303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Polatlı: Köy Yolu<br><br>            <p style="font-size: 13px;"><b>Events:</b> Ayşe and İhsan walk together towards the village so she can give Haşmet Bey his arm massage. Ayşe asks him about the photo of Sabiha.</p>        </div>        ` },
{ lat: 39.580473847577295, lon: 32.1447303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: darkpurple;">Chapter 11</h4>            <b>Location:</b> Ankara: Polatlı: Köy Yakınındaki Vadi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami rides toward the military headquarters as dusk falls, observing the distant tents, fires, and the mobile hospital where Ayşe works.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1492303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: Karadağ: Dağ Yolu<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami travels in an ambulance down the mountain road, trying to comfort the delirious, dying İhsan.</p>        </div>        ` },
{ lat: 39.592165190528384, lon: 32.145480299999996, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: Basri Village: Village Room<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami sits with a sobbing Cemal and Haşmet Bey. He silently vows to be the first to enter Izmir to prove his devotion to Ayşe&#39;s memory.</p>        </div>        ` },
{ lat: 39.93403323810568, lon: 32.8739226, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Cebeci: Cebeci Hastahanesi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami lies severely ill and paralyzed, contemplating his upcoming brain surgery and dreading that the doctors will discover his secrets, while reflecting on his memories of Karadağ.</p>        </div>        ` },
{ lat: 39.592165190528384, lon: 32.1379803, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: İhsan'ın Çadırı ve Karargâhı<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan works tirelessly through the night giving mechanical, stern orders. Later, during the night before the battle, Peyami returns here and finds İhsan restlessly sleep-talking about the assault.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1342303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: Karadağ<br><br>            <p style="font-size: 13px;"><b>Events:</b> Under the glow of Greek flare pistols, Turkish soldiers scale the steep, rocky slopes of the mountain in a brutal night battle, taking heavy casualties. | A fierce hand-to-hand combat takes place. İhsan reaches the rocky summit, gets shot during a volley of enemy fire, and falls dying into Peyami&#39;s arms. The surviving soldiers successfully seize the peak.</p>        </div>        ` },
{ lat: 39.57917480947162, lon: 32.1379803, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: Seyyar Hastane (Ayşe'nin Çadırı)<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami sits quietly behind the hospital to calm his racing heart before visiting Ayşe, reflecting on his past life and his deep feelings. | Peyami enters the ether-scented tent and watches Ayşe care for wounded soldiers. They step to the tent door and discuss the upcoming battle, İhsan&#39;s command, and bid each other a poignant farewell. | İhsan is laid in Ayşe&#39;s tent. Peyami learns that Ayşe was killed by artillery fire while treating a wounded soldier. Her body is brought in and laid side-by-side with İhsan, who dies holding Peyami&#39;s hand.</p>        </div>        ` },
{ lat: 39.57917480947162, lon: 32.145480299999996, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: Karadağ<br><br>            <p style="font-size: 13px;"><b>Events:</b> The soldiers and their horses press on through a heavily shelled field where explosions rip up the earth. | The regiment advances up a significant slope under intense machine gun and artillery fire. Peyami experiences the terrifying but strangely simple reality of combat.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1507303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: Arka Sırtlar<br><br>            <p style="font-size: 13px;"><b>Events:</b> İhsan takes over his regiment and rigorously trains the newly recruited troops on the yellow ridge lines.</p>        </div>        ` },
{ lat: 39.59346422863406, lon: 32.1462303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: Alay Karargâhı<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami wakes up to find İhsan drinking coffee. Greek airplanes bomb the camp, but İhsan watches them with child-like fascination, and the soldiers prepare for battle amid intense artillery noise.</p>        </div>        ` },
{ lat: 39.59346422863406, lon: 32.1372303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: Karadağ: Alay Sargı Mahalli<br><br>            <p style="font-size: 13px;"><b>Events:</b> Set up in a large natural pit, the dressing station acts as the staging area for the mountain assault. İhsan&#39;s aide Muhsin is wounded here by a shell, and İhsan coordinates with his battalion commanders before the night climb.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1327303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: Hattı Bala (Sırtlar)<br><br>            <p style="font-size: 13px;"><b>Events:</b> The regiment, led by İhsan on horseback, prepares to cross the ridge into the active combat zone. Peyami carries messages and resists the urge to wave back at the mobile hospital before crossing.</p>        </div>        ` },
{ lat: 39.57787577136594, lon: 32.1372303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: Vadiye İnen Meyil<br><br>            <p style="font-size: 13px;"><b>Events:</b> Peyami walks down the slope toward the mobile hospital, crying as he dramatically practices the emotional speech he plans to deliver to Ayşe.</p>        </div>        ` },
{ lat: 39.57787577136594, lon: 32.1462303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: Sırtın Ardındaki Vadi<br><br>            <p style="font-size: 13px;"><b>Events:</b> The troops march through a dusty valley enclosed by mountains while artillery shells detonate around them.</p>        </div>        ` },
{ lat: 39.58567, lon: 32.1522303, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: pink;">Chapter 12</h4>            <b>Location:</b> Ankara: Polatlı: Basri Köyü Mezarlığı<br><br>            <p style="font-size: 13px;"><b>Events:</b> The bodies of Ayşe and İhsan, wrapped in Turkish flags, are buried side-by-side in the village cemetery in the presence of Haşmet Bey, Cemal, and Peyami.</p>        </div>        ` },
{ lat: 39.9327342, lon: 32.8731726, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: lightblue;">Chapter 13</h4>            <b>Location:</b> Ankara: Cebeci: Cebeci Hastahanesi<br><br>            <p style="font-size: 13px;"><b>Events:</b> Bölümün sonunda olayların geçtiği genel mekan ve tarih bilgisi olarak belirtilen şehir.</p>        </div>        ` },

        var currentStoryIdx = 0;
        var mapInstance = null;
        var activePopup = null;

        // Wait for Leaflet map to initialize
        setTimeout(function() {
            for (var key in window) {
                if (window[key] && window[key].flyTo) {
                    mapInstance = window[key];
                    break;
                }
            }
            if (mapInstance) {
                // Initialize first scene
                goToStory(0);
            } else {
                console.error("Could not find Folium map instance.");
            }
        }, 1000);

        function changeStory(dir) {
            var newIdx = currentStoryIdx + dir;
            if (newIdx >= 0 && newIdx < storyData.length) {
                goToStory(newIdx);
            }
        }

        function goToStory(idx) {
            currentStoryIdx = idx;
            var node = storyData[idx];
            
            // Update counter text
            document.getElementById('story-counter').innerText = (idx + 1) + ' / ' + storyData.length;
            
            // Disable/Enable buttons at ends of array
            document.getElementById('btn-prev').disabled = (idx === 0);
            document.getElementById('btn-next').disabled = (idx === storyData.length - 1);

            // Fly camera to location smoothly
            mapInstance.flyTo([node.lat, node.lon], 13, {
                animate: true,
                duration: 1.5
            });

            // Open the popup slightly above the marker
            setTimeout(function() {
                if (activePopup) {
                    mapInstance.closePopup(activePopup);
                }
                activePopup = L.popup({offset: [0, -10]})
                    .setLatLng([node.lat, node.lon])
                    .setContent(node.html)
                    .openOn(mapInstance);
            }, 500);
        }
    </script>
