    <script>
        var storyData = [
            { lat: 39.9327342, lon: 32.8746726, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: lightblue;">Chapter 13</h4>            <b>Location:</b> Ankara: Cebeci: Cebeci Hastahanesi<br><br>            <p style="font-size: 13px;"><b>Action:</b> The first doctor explains that he investigated the documents of Reserve Lieutenant Peyami and found no records of a nurse named Ayşe or a colonel named İhsan.</p>        </div>        ` },

{ lat: 39.932593320140356, lon: 32.87468496386455, html: `        <div style="width: 300px; font-family: sans-serif;">            <h4 style="margin-top: 0; color: lightblue;">Chapter 13</h4>            <b>Location:</b> Ankara: Cebeci: Cebeci Hastahanesi<br><br>            <p style="font-size: 13px;"><b>Action:</b> Peyami Bey dies at the hospital during an operation to extract a bullet from his brain, leaving behind his manuscript.</p>        </div>        ` }
        ];
        var currentStoryIdx = 0;
        var mapInstance = null;
        var activePopup = null;

        // Wait for Leaflet map to initialize
        setTimeout(function() {
            for (var key in window) {
                if (window[key] && window[key].flyTo) {
                    mapInstance = window[key];
                    break;
                }
            }
            if (mapInstance && storyData.length > 0) {
                // Initialize first scene
                goToStory(0);
            }
        }, 1000);

        function changeStory(dir) {
            var newIdx = currentStoryIdx + dir;
            if (newIdx >= 0 && newIdx < storyData.length) {
                goToStory(newIdx);
            }
        }

        function goToStory(idx) {
            currentStoryIdx = idx;
            var node = storyData[idx];
            
            // Update counter text
            document.getElementById('story-counter').innerText = (idx + 1) + ' / ' + storyData.length;
            
            // Disable/Enable buttons at ends of array
            document.getElementById('btn-prev').disabled = (idx === 0);
            document.getElementById('btn-next').disabled = (idx === storyData.length - 1);

            // Fly camera to location smoothly
            mapInstance.flyTo([node.lat, node.lon], 13, {
                animate: true,
                duration: 1.5
            });

            // Open the popup slightly above the marker
            setTimeout(function() {
                if (activePopup) {
                    mapInstance.closePopup(activePopup);
                }
                activePopup = L.popup({offset: [0, -10]})
                    .setLatLng([node.lat, node.lon])
                    .setContent(node.html)
                    .openOn(mapInstance);
            }, 500);
        }
    </script>
